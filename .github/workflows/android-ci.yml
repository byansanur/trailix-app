name: Android CI

# CI akan berjalan setiap ada Push atau Merge ke branch 'main'
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1. Mengambil kode dari repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java Development Kit (JDK) 11
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Gradle dan Cache
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. Membuat local.properties dan memasukkan semua Secret Variables
      - name: Create local.properties
        run: |
            cat <<EOF > local.properties
            baseUrl=${{ secrets.BASE_URL }}
            imageUrl=${{ secrets.IMAGE_URL }}
            apiKey=${{ secrets.API_KEY }}
            accessToken=${{ secrets.ACCESS_TOKEN }}
            dbKeySecretSha256=${{ secrets.DB_KEY_SECRET }}
            EOF

      # 5. Memberikan akses eksekusi pada file gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 6. Menjalankan Linter & Unit Test
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      # 7. Melakukan Build APK versi Debug
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 8. Mengunggah hasil APK agar bisa di-download dari halaman GitHub Actions
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7